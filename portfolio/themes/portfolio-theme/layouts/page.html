{{ define "main" }}
  
  <div class = "pageBar">
    <div style="background-color: rgb(185, 76, 109); width: 1rem;height:1rem; border-radius: 50%; margin-left: 0.5rem; margin-right: 1rem;"></div>
    <div class="pageTitle">{{ .Title }}</div>
  </div>
  <div class = "window">
    <div class = "content">
      {{ $dateMachine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
      {{ $dateHuman := .Date | time.Format ":date_long" }}
      <time datetime="{{ $dateMachine }}">{{ $dateHuman }}</time>
      {{ .Content }}
    </div>
  {{ partial "terms.html" (dict "taxonomy" "tags" "page" .) }}
  </div>
{{ end }}
